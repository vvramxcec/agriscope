name: Documentation Improvement
description: Suggest improvements to the project documentation
title: "[DOCS]: "
labels: ["documentation"]

body:
  - type: checkboxes
    id: docs_area
    attributes:
      label: Which documentation needs improvement?
      options:
        - label: README.md
        - label: CONTRIBUTING.md
        - label: Specific language guide
        - label: Other
    validations:
      required: true

  - type: textarea
    id: improvement
    attributes:
      label: Describe the improvement
      description: Tell us what is missing or what can be better.
    validations:
      required: true

  - type: textarea
    id: proposed_changes
    attributes:
      label: Proposed changes
      description: Describe the changes you would like to make.
    validations:
      required: true